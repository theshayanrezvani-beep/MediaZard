name: News Bot

on:
  # تریگرِ اصلی: cron-job.org این را از طریقِ repository_dispatch صدا می‌زند
  repository_dispatch:
    types: [run-bot]
  # اجرای دستی از تبِ Actions
  workflow_dispatch:
  # تریگرِ پشتیبانِ کم‌تکرار (هر ۶ ساعت) — اگر cron-job.org قطع شد، ربات نخوابد
  schedule:
    - cron: "0 */6 * * *"

permissions:
  contents: write   # برای commitِ seen.json
  models: read      # برای استفاده از GitHub Models

# اجراها روی هم نیفتند (تا seen.json خراب نشود)
concurrency:
  group: news-bot
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run news bot
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          GITHUB_TOKEN: ${{ github.token }}
        run: python news_bot.py

      - name: Commit state
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add seen.json
          git diff --staged --quiet || git commit -m "update seen.json [skip ci]"
          git push
