name: News Bot

on:
  repository_dispatch:
    types: [run-bot]
  workflow_dispatch:
  schedule:
    - cron: "0 */6 * * *"

permissions:
  contents: write
  models: read

concurrency:
  group: news-bot
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run news bot
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          GITHUB_TOKEN: ${{ github.token }}
        run: python news_bot.py

      - name: Commit state
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # اگر به هر دلیلی فایل ساخته نشد، یه نسخه‌ی خالی بساز تا git گیر نکند
          [ -f seen.json ] || echo '{"seen":[],"recent":[]}' > seen.json
          git add seen.json
          if git diff --staged --quiet; then
            echo "تغییری در seen.json نبود"
            exit 0
          fi
          git commit -m "update seen.json [skip ci]"
          # قبل از push با ریموت sync کن و چند بار retry بزن
          # (جلوی خطای 'fetch first' موقعِ re-run یا اجراهای نزدیک‌به‌هم را می‌گیرد)
          for i in 1 2 3 4 5; do
            if git push origin HEAD:main; then
              echo "✅ push شد"
              exit 0
            fi
            echo "push رد شد؛ sync با ریموت و تلاش دوباره ($i)..."
            git fetch origin main
            git merge -X ours --no-edit origin/main || true
            sleep 4
          done
          echo "❌ push بعد از چند تلاش ناموفق ماند"
          exit 1
